name: tests

on:
  push:
  pull_request:

jobs:
  js:
    name: JS smoke + i18n lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Runtime smoke test
        run: node tests/smoke.mjs
      - name: i18n integrity (parity + duplicates + code keys)
        run: node tests/i18n_check.mjs

  python:
    name: formula tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install numpy pytest
      - name: Pytest
        run: python -m pytest tests/test_taf_formulas.py -q
